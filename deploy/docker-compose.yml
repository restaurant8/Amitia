name: amitia

services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  surrealdb:
    image: surrealdb/surrealdb:latest
    user: root
    command: start --user root --pass root --bind 0.0.0.0:8000 rocksdb:/data/graph.db
    volumes:
      - surreal_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    environment:
      - SKIP_ENGINE_LAUNCH=1
      - SKIP_SIDECAR_LAUNCH=1
      - BRIDGE_API_TOKEN=amitia-bridge-secret-change-me
    volumes:
      - backend_data:/app/data
    depends_on:
      - qdrant
      - surrealdb
    restart: unless-stopped

  wechat-sidecar:
    image: node:22-slim
    network_mode: "service:backend"
    working_dir: /app
    volumes:
      - ../backend/sidecar/bundle.mjs:/app/bundle.mjs:ro
    command: node bundle.mjs
    environment:
      - SIDECAR_HOST=127.0.0.1
      - SIDECAR_PORT=9876
      - CORE_URL=http://127.0.0.1:8899
      - BRIDGE_API_TOKEN=amitia-bridge-secret-change-me
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
    ports:
      - "5178:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
  surreal_data:
  backend_data:
