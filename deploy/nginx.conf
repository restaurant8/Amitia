map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 100m;

    location /api/ {
        proxy_pass http://backend:8899;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /audio/  { proxy_pass http://backend:8899; }
    location /voice/  { proxy_pass http://backend:8899; }
    location /images/ { proxy_pass http://backend:8899; }
    location /videos/ { proxy_pass http://backend:8899; }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
