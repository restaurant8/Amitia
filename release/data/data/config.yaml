# ============================================================
# U-Ai Runtime Configuration (single-user)
# ============================================================

app:
  # deployMode: "desktop-local" | "cloud-web"
  # - desktop-local: Core runs on this machine, binds 127.0.0.1, auth optional
  # - cloud-web: Core runs on user's own cloud server, HTTPS, auth required
  deployMode: "desktop-local"
  host: "127.0.0.1"
  port: 8899

web:
  enabled: true
  # publicBaseUrl: the external HTTPS URL when deployed in cloud-web mode
  # e.g. https://my-ai.example.com
  publicBaseUrl: ""
  # requireAuth: enforce login before accessing the web UI
  requireAuth: true

bridge:
  enabled: true
  # mode: "local" | "cloud"
  # - local: Bridge runs on this desktop, alongside Core
  # - cloud: Bridge runs on the same cloud server as Core
  mode: "cloud"
  host: "127.0.0.1"
  port: 8898
  coreUrl: "http://127.0.0.1:8899"
  # apiToken: shared secret between Bridge and Core for cloud mode
  apiToken: "d7aXwqUT3HyxeRphIZj0i1zLf9KBgPWn"

storage:
  dataDir: "./data"
